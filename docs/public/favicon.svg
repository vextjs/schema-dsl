<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">schema-dsl logo</title>
  <desc id="desc">A minimal schema-dsl mark with a routed s trace that draws in once.</desc>

  <style>
    @media (prefers-reduced-motion: no-preference) {
      .trace {
        stroke-dasharray: 1;
        animation: trace-in 900ms cubic-bezier(0.22, 0.61, 0.36, 1) both;
      }

      @keyframes trace-in {
        from {
          opacity: 0.35;
          stroke-dashoffset: 1;
        }

        to {
          opacity: 1;
          stroke-dashoffset: 0;
        }
      }
    }
  </style>

  <rect x="44" y="44" width="424" height="424" rx="96" fill="#111827"/>
  <path class="trace" pathLength="1" d="M356 154H244C198 154 172 178 172 210C172 241 196 258 239 258H279C322 258 348 282 348 316C348 350 319 372 272 372H158" fill="none" stroke="#F97316" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
