name: CI

on:
  push:
    branches: [ v2, main ]
  pull_request:
    branches: [ v2, main ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        # engines: >=18.0.0  (removed 16.x; added 22.x current LTS)
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Lint
      run: npm run lint

    - name: Type check
      run: npm run typecheck

    - name: Type contract tests
      run: npm run test:types

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Examples type check
      run: npm run examples:typecheck

    - name: Examples run
      run: npm run examples:run

    # Rspress/Rspack website builds require Node.js 20.19+ or 22.12+.
    # Keep package validation on Node 18, but build the website on supported Node lines.
    - name: Install website dependencies
      if: matrix.node-version != '18.x'
      working-directory: website
      run: npm ci

    - name: Website build
      if: matrix.node-version != '18.x'
      working-directory: website
      run: npm run build

    - name: Install Playwright Chromium
      if: matrix.node-version == '22.x'
      working-directory: website
      run: npx playwright install --with-deps chromium

    - name: Website accessibility smoke
      if: matrix.node-version == '22.x'
      working-directory: website
      run: npm run test:a11y

    - name: ESM/CJS interop
      run: npm run test:interop

    - name: Version smoke
      run: npm run test:version

    - name: Production dependency audit
      run: npm run test:audit

    - name: Pack dry run
      run: npm pack --dry-run

  release-boundary:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Documentation links
      run: npm run docs:linkcheck

    - name: Performance documentation snapshot
      run: npm run docs:performance-check

    - name: Packed consumer and optional-peer matrix
      run: npm run test:package

    - name: Full dependency audit
      run: npm run test:audit:all

    - name: Performance regression smoke
      run: npm run bench:guard:smoke

