# ─────────────────────────────────────────────────────────────
# schema-dsl 文档站 — 自动部署到 vextjs/schema-dsl.github.io
#
# 触发条件：
#   - push 到 main 分支（`website/` 或 `docs/` 目录变更时触发）
#   - 手动触发（workflow_dispatch）
#
# 流水线结构：
#   1. build  — 在 website/ 目录安装依赖并执行 rspress build
#   2. deploy — 将 website/dist/ 跨仓库推送到 schema-dsl.github.io@main
#
# 首次使用前需完成以下一次性设置：
#   1. 在 GitHub 创建 Fine-grained PAT，授权 vextjs/schema-dsl.github.io
#      的 Contents: Read and write 权限
#   2. 在本仓库 Settings → Secrets → Actions 中添加 Secret：
#      名称 DOCS_DEPLOY_TOKEN，值为上述 PAT
#   3. 在 schema-dsl.github.io 仓库 Settings → Pages 中将
#      Source 设为 "Deploy from a branch" → main → / (root)
#
# @see website/rspress.config.ts
# @see https://rspress.dev/guide/start/deploy
# ─────────────────────────────────────────────────────────────

name: Deploy Docs

on:
  push:
    branches:
      - main
      - v2
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.WEBSITE || secrets.DOCS_DEPLOY_TOKEN || secrets.GH_PAGES_TOKEN || secrets.PERSONAL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build
        env:
          NODE_ENV: production

      - name: Validate deploy token
        shell: bash
        run: |
          if [ -z "${DEPLOY_TOKEN}" ]; then
            echo "::error::Missing deploy token. Set one of these repository secrets in vextjs/schema-dsl: WEBSITE / DOCS_DEPLOY_TOKEN / GH_PAGES_TOKEN / PERSONAL_TOKEN"
            exit 1
          fi

      - name: Deploy to schema-dsl.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ env.DEPLOY_TOKEN }}
          external_repository: vextjs/schema-dsl.github.io
          publish_branch: main
          publish_dir: website/dist
          force_orphan: true
          commit_message: 'chore: deploy docs (${{ github.repository }}@${{ github.sha }})'

      - name: Print deployment URL
        run: 'echo "✅ 文档站已部署至: https://schema-dsl.github.io/"'
