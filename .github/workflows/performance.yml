name: Performance Regression

on:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

jobs:
  full-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run three-median full baseline gate
        run: npm run bench:guard:full

      - name: Run full comparison reports
        if: ${{ always() }}
        run: npm run bench:full

      - name: Upload benchmark reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-reports-${{ github.run_id }}
          path: test/benchmarks/.tmp/*.json
          if-no-files-found: error
