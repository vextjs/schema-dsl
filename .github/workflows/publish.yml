name: Publish to npm

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Verify tag commit belongs to main
        run: |
          git fetch origin main:refs/remotes/origin/main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit ${GITHUB_SHA} is not contained in origin/main"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Type contract tests
        run: npm run test:types

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Type check documentation examples
        run: npm run examples:typecheck

      - name: Run documentation examples
        run: npm run examples:run

      - name: Verify package version export
        run: npm run test:version

      - name: Verify ESM/CJS shared runtime state
        run: npm run test:interop

      - name: Verify documentation links
        run: npm run docs:linkcheck

      - name: Verify performance documentation snapshot
        run: npm run docs:performance-check

      - name: Verify packed consumers and optional peers
        run: npm run test:package

      - name: Install documentation website dependencies
        working-directory: website
        run: npm ci

      - name: Build documentation website
        working-directory: website
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: website
        run: npx playwright install --with-deps chromium

      - name: Verify website accessibility interactions
        working-directory: website
        run: npm run test:a11y

      - name: Performance regression smoke
        run: npm run bench:guard:smoke

      - name: Full dependency audit
        run: npm run test:audit:all

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
